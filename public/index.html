<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ItarsiTaxi Backend</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f6faf7;
        color: #173224;
      }
      main {
        max-width: 720px;
        margin: 64px auto;
        padding: 24px;
      }
      .card {
        background: #fff;
        border: 1px solid #dce9e0;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }
      code {
        background: #eef6f0;
        padding: 2px 6px;
        border-radius: 6px;
      }
      a {
        color: #0f8a43;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1>ItarsiTaxi Backend</h1>
        <p>Backend is deployed on Netlify Functions.</p>
        <p>Health check: <a href="/api/ping"><code>/api/ping</code></a></p>
      </div>
    </main>
  </body>
</html>
